<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Testing Interface</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            background: linear-gradient(120deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
            padding: 36px 28px 28px 28px;
        }
        h1 {
            text-align: center;
            color: #2d8cf0;
            font-size: 2.3em;
            margin-bottom: 0;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 32px;
        }
        .api-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }
        .api-box {
            background: #f7fafd;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(45,140,240,0.04);
            padding: 22px 18px 18px 18px;
            margin-bottom: 0;
        }
        .api-box h2 {
            color: #2d8cf0;
            font-size: 1.18em;
            margin-bottom: 10px;
            border-bottom: 2px solid #b2d7f7;
            padding-bottom: 4px;
        }
        label {
            display: block;
            margin: 10px 0 4px 0;
            color: #444;
            font-size: 1em;
        }
        input, textarea {
            width: 100%;
            padding: 8px 10px;
            border-radius: 5px;
            border: 1px solid #d0d7de;
            margin-bottom: 10px;
            font-size: 1em;
        }
        button {
            background: linear-gradient(90deg, #2d8cf0 0%, #a8edea 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 22px;
            font-size: 1.08em;
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.2s;
        }
        button:hover {
            background: linear-gradient(90deg, #1e6bb8 0%, #a8edea 100%);
        }
        .result {
            background: #f2f2f2;
            border-radius: 6px;
            padding: 10px 12px;
            margin-top: 10px;
            font-size: 0.98em;
            max-height: 220px;
            overflow: auto;
            white-space: pre-wrap;
        }
        @media (max-width: 900px) {
            .api-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>API Testing Interface</h1>
        <div class="subtitle">Test Product API Endpoints</div>
        <div class="api-grid">
            <!-- GET ALL PRODUCTS -->
            <div class="api-box">
                <h2>GET All Products</h2>
                <label>Title (tìm kiếm):<br><input id="getall-title" placeholder="VD: Hoodie"></label>
                <label>Min Price:<br><input id="getall-min" type="number" value="0"></label>
                <label>Max Price:<br><input id="getall-max" type="number" value="1000000"></label>
                <label>Page:<br><input id="getall-page" type="number" value="1"></label>
                <label>Limit:<br><input id="getall-limit" type="number" value="10"></label>
                <button onclick="getAllProducts()">🔍 Lấy danh sách</button>
                <div class="result" id="result-getall"></div>
            </div>
            <!-- GET BY ID -->
            <div class="api-box">
                <h2>GET by ID</h2>
                <label>Product ID:<br><input id="getid-id" placeholder="VD: 1"></label>
                <button onclick="getById()">Tìm theo ID</button>
                <div class="result" id="result-getid"></div>
            </div>
            <!-- GET BY SLUG -->
            <div class="api-box">
                <h2>GET by Slug</h2>
                <label>Product Slug:<br><input id="getslug-slug" placeholder="VD: dien-thoai-samsung"></label>
                <button onclick="getBySlug()">Tìm theo Slug</button>
                <div class="result" id="result-getslug"></div>
            </div>
            <!-- POST CREATE PRODUCT -->
            <div class="api-box">
                <h2>POST Create Product</h2>
                <label>Title:<br><input id="post-title" placeholder="VD: Điện thoại Samsung Galaxy"></label>
                <label>Price:<br><input id="post-price" type="number" placeholder="VD: 500"></label>
                <label>Description:<br><textarea id="post-desc" rows="2" placeholder="Mô tả sản phẩm..."></textarea></label>
                <label>Category (JSON):<br><input id="post-category" placeholder='{"id":1,"name":"Điện tử"}'></label>
                <label>Images (mảng link, JSON):<br><input id="post-images" placeholder='["https://...jpg"]'></label>
                <button onclick="postProduct()">Tạo sản phẩm</button>
                <div class="result" id="result-post"></div>
            </div>
            <!-- PUT UPDATE PRODUCT -->
            <div class="api-box">
                <h2>PUT Update Product</h2>
                <label>Product ID:<br><input id="put-id" placeholder="VD: 1"></label>
                <label>Body (JSON):<br><textarea id="put-body" rows="2" placeholder='{"title":"Tên mới"}'></textarea></label>
                <button onclick="putProduct()">Cập nhật</button>
                <div class="result" id="result-put"></div>
            </div>
            <!-- DELETE PRODUCT -->
            <div class="api-box">
                <h2>DELETE Product</h2>
                <label>Product ID:<br><input id="del-id" placeholder="VD: 1"></label>
                <button onclick="deleteProduct()">Xóa mềm</button>
                <div class="result" id="result-del"></div>
            </div>
        </div>
    </div>
    <script>
    function pretty(res) {
        if (typeof res === 'string') return res;
        return JSON.stringify(res, null, 2);
    }
    async function getAllProducts() {
        const title = document.getElementById('getall-title').value;
        const min = document.getElementById('getall-min').value;
        const max = document.getElementById('getall-max').value;
        const page = document.getElementById('getall-page').value;
        const limit = document.getElementById('getall-limit').value;
        let url = `/products?title=${encodeURIComponent(title)}&minPrice=${min}&maxPrice=${max}&page=${page}&limit=${limit}`;
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('result-getall').textContent = pretty(data);
    }
    async function getById() {
        const id = document.getElementById('getid-id').value;
        if (!id) return;
        const res = await fetch(`/products/${id}`);
        const data = await res.json();
        document.getElementById('result-getid').textContent = pretty(data);
    }
    async function getBySlug() {
        const slug = document.getElementById('getslug-slug').value;
        if (!slug) return;
        const res = await fetch(`/products/slug/${slug}`);
        const data = await res.json();
        document.getElementById('result-getslug').textContent = pretty(data);
    }
    async function postProduct() {
        const title = document.getElementById('post-title').value;
        const price = Number(document.getElementById('post-price').value);
        const description = document.getElementById('post-desc').value;
        let category, images;
        try { category = JSON.parse(document.getElementById('post-category').value); } catch { category = null; }
        try { images = JSON.parse(document.getElementById('post-images').value); } catch { images = null; }
        const body = { title, price, description, category, images };
        const res = await fetch('/products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        document.getElementById('result-post').textContent = pretty(data);
    }
    async function putProduct() {
        const id = document.getElementById('put-id').value;
        let body;
        try { body = JSON.parse(document.getElementById('put-body').value); } catch { body = {}; }
        const res = await fetch(`/products/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        document.getElementById('result-put').textContent = pretty(data);
    }
    async function deleteProduct() {
        const id = document.getElementById('del-id').value;
        const res = await fetch(`/products/${id}`, { method: 'DELETE' });
        const data = await res.json();
        document.getElementById('result-del').textContent = pretty(data);
    }
    </script>
</body>
</html>
